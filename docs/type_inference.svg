<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 770" font-family="ui-sans-serif,-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d1117"/><stop offset="1" stop-color="#0a0e14"/>
    </linearGradient>
    <filter id="soft" x="-30%" y="-40%" width="160%" height="180%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#58a6ff"/>
    </marker>
  </defs>

  <rect width="640" height="770" rx="16" fill="url(#bg)"/>

  <text x="40" y="50" fill="#f0f6fc" font-size="21" font-weight="700">Type inference</text>
  <text x="40" y="72" fill="#8b949e" font-size="13" font-weight="500" letter-spacing="2">GRADUAL NARROWING CASCADE</text>
  <rect x="40" y="84" width="560" height="2" rx="1" fill="#21262d"/>

  <!-- start hint -->
  <text x="130" y="112" text-anchor="middle" fill="#6e7681" font-size="11.5">per-column sampling (10K rows)</text>

  <!-- vertical arrows -->
  <g stroke="#58a6ff" stroke-width="2" fill="none" marker-end="url(#ar)">
    <path d="M130 168 L130 188"/>
    <path d="M130 258 L130 278"/>
    <path d="M130 348 L130 368"/>
    <path d="M130 438 L130 458"/>
    <path d="M130 528 L130 548"/>
    <path d="M130 618 L130 638"/>
  </g>

  <!-- transition labels -->
  <g font-size="11" fill="#8b949e">
    <text x="150" y="182">not a boolean</text>
    <text x="150" y="272">negative · &gt; i64</text>
    <text x="150" y="362">'.' · 'e' · &gt; u64</text>
    <text x="150" y="452">date pattern</text>
    <text x="150" y="542">datetime + time</text>
    <text x="150" y="632">unparseable</text>
  </g>

  <!-- connectors to notes -->
  <g stroke="#30363d" stroke-width="1.5" stroke-dasharray="3 3" fill="none">
    <path d="M220 124 L360 124"/>
    <path d="M220 480 L360 480"/>
    <path d="M220 570 L360 570"/>
    <path d="M220 660 L360 660"/>
  </g>

  <!-- pills -->
  <!-- Boolean -->
  <g filter="url(#soft)"><rect x="40" y="124" width="180" height="44" rx="14" fill="#1f6feb22" stroke="#1f6feb99"/></g>
  <text x="130" y="151" text-anchor="middle" fill="#79c0ff" font-size="15" font-weight="700">Boolean</text>
  <!-- Int64 -->
  <g filter="url(#soft)"><rect x="40" y="214" width="180" height="44" rx="14" fill="#2ea04322" stroke="#2ea04399"/></g>
  <text x="130" y="241" text-anchor="middle" fill="#56d364" font-size="15" font-weight="700">Int64</text>
  <!-- UInt64 -->
  <g filter="url(#soft)"><rect x="40" y="304" width="180" height="44" rx="14" fill="#d2992222" stroke="#d2992299"/></g>
  <text x="130" y="331" text-anchor="middle" fill="#e3b341" font-size="15" font-weight="700">UInt64</text>
  <!-- Float64 -->
  <g filter="url(#soft)"><rect x="40" y="394" width="180" height="44" rx="14" fill="#a371f722" stroke="#a371f799"/></g>
  <text x="130" y="421" text-anchor="middle" fill="#d2a8ff" font-size="15" font-weight="700">Float64</text>
  <!-- Date32 -->
  <g filter="url(#soft)"><rect x="40" y="458" width="180" height="44" rx="14" fill="#f7816622" stroke="#f7816699"/></g>
  <text x="130" y="485" text-anchor="middle" fill="#ff9b72" font-size="15" font-weight="700">Date32</text>
  <!-- Timestamp -->
  <g filter="url(#soft)"><rect x="40" y="548" width="180" height="44" rx="14" fill="#79c0ff22" stroke="#79c0ff99"/></g>
  <text x="130" y="575" text-anchor="middle" fill="#a5d6ff" font-size="15" font-weight="700">Timestamp</text>
  <!-- LargeUtf8 -->
  <g filter="url(#soft)"><rect x="40" y="638" width="180" height="44" rx="14" fill="#f8514922" stroke="#f85149aa"/></g>
  <text x="130" y="665" text-anchor="middle" fill="#ff7b72" font-size="15" font-weight="700">LargeUtf8</text>

  <!-- notes -->
  <g font-size="11.5">
    <g filter="url(#soft)"><rect x="360" y="100" width="240" height="50" rx="11" fill="#161b22" stroke="#30363d"/></g>
    <text x="374" y="120" fill="#79c0ff" font-weight="600">Boolean patterns</text>
    <text x="374" y="138" fill="#8b949e">true/false · yes/no · y/n · on/off · t/f · 0/1</text>

    <g filter="url(#soft)"><rect x="360" y="450" width="240" height="60" rx="11" fill="#161b22" stroke="#30363d"/></g>
    <text x="374" y="470" fill="#ff9b72" font-weight="600">Date formats</text>
    <text x="374" y="488" fill="#8b949e">YYYY-MM-DD · DD/MM/YYYY</text>
    <text x="374" y="503" fill="#8b949e">MM/DD/YYYY  (DD/MM wins if both)</text>

    <g filter="url(#soft)"><rect x="360" y="540" width="240" height="60" rx="11" fill="#161b22" stroke="#30363d"/></g>
    <text x="374" y="560" fill="#a5d6ff" font-weight="600">Timestamp formats</text>
    <text x="374" y="578" fill="#8b949e">RFC3339 · ISO8601</text>
    <text x="374" y="593" fill="#8b949e">YYYY-MM-DD HH:MM:SS · zone/frac</text>

    <g filter="url(#soft)"><rect x="360" y="636" width="240" height="48" rx="11" fill="#161b22" stroke="#f8514955"/></g>
    <text x="374" y="656" fill="#ff7b72" font-weight="600">Fallback</text>
    <text x="374" y="674" fill="#8b949e">keeps every original value as a string</text>
  </g>

  <!-- footer -->
  <text x="40" y="724" fill="#6e7681" font-size="12">First type in the cascade that every sampled value satisfies is kept · 95% confidence threshold.</text>
  <text x="40" y="744" fill="#6e7681" font-size="12">--full-schema-inference scans all rows instead of the first 10K.</text>
</svg>
