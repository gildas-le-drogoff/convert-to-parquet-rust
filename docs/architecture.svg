<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 600" font-family="ui-sans-serif,-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#0a0e14"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#161b22"/>
      <stop offset="1" stop-color="#11161d"/>
    </linearGradient>
    <linearGradient id="gCli" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#79c0ff"/><stop offset="1" stop-color="#1f6feb"/></linearGradient>
    <linearGradient id="gInput" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#56d364"/><stop offset="1" stop-color="#2ea043"/></linearGradient>
    <linearGradient id="gCore" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#e3b341"/><stop offset="1" stop-color="#d29922"/></linearGradient>
    <linearGradient id="gSchema" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#d2a8ff"/><stop offset="1" stop-color="#a371f7"/></linearGradient>
    <linearGradient id="gExport" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ff9b72"/><stop offset="1" stop-color="#f78166"/></linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#58a6ff"/>
    </marker>
  </defs>

  <rect width="920" height="600" rx="16" fill="url(#bg)"/>

  <!-- title -->
  <text x="46" y="52" fill="#f0f6fc" font-size="22" font-weight="700">convert-to-parquet</text>
  <text x="46" y="74" fill="#8b949e" font-size="13" font-weight="500" letter-spacing="2.5">MODULE ARCHITECTURE</text>
  <text x="874" y="60" text-anchor="end" fill="#6e7681" font-size="12" letter-spacing="1.5">Rust · Arrow · Rayon</text>
  <rect x="46" y="86" width="828" height="2" rx="1" fill="#21262d"/>

  <!-- arrows (under cards) -->
  <g stroke="#58a6ff" stroke-width="2" fill="none" marker-end="url(#arrow)" opacity="0.85">
    <path d="M460 168 L460 192"/>
    <path d="M300 300 L329 300"/>
    <path d="M587 300 L616 300"/>
    <path d="M460 432 L460 474"/>
  </g>

  <!-- CLI band -->
  <g filter="url(#soft)"><rect x="280" y="108" width="360" height="60" rx="14" fill="url(#card)" stroke="#30363d"/></g>
  <rect x="280" y="108" width="5" height="60" rx="2.5" fill="url(#gCli)"/>
  <text x="300" y="128" fill="#79c0ff" font-size="11" font-weight="700" letter-spacing="2">CLI</text>
  <g font-size="12" fill="#c9d1d9" font-weight="600" text-anchor="middle">
    <rect x="300" y="135" width="80" height="24" rx="12" fill="#1f6feb22" stroke="#1f6feb55"/><text x="340" y="151">main</text>
    <rect x="392" y="135" width="80" height="24" rx="12" fill="#1f6feb22" stroke="#1f6feb55"/><text x="432" y="151">tui</text>
    <rect x="484" y="135" width="120" height="24" rx="12" fill="#1f6feb22" stroke="#1f6feb55"/><text x="544" y="151">inspect</text>
  </g>

  <!-- Input -->
  <g filter="url(#soft)"><rect x="46" y="196" width="254" height="208" rx="14" fill="url(#card)" stroke="#30363d"/></g>
  <rect x="46" y="196" width="5" height="208" rx="2.5" fill="url(#gInput)"/>
  <text x="64" y="220" fill="#56d364" font-size="11" font-weight="700" letter-spacing="2">INPUT</text>
  <g font-size="12.5" fill="#c9d1d9" font-weight="600" text-anchor="middle">
    <rect x="64" y="232" width="218" height="34" rx="9" fill="#2ea04318" stroke="#2ea04340"/><text x="173" y="254">utils · readers</text>
    <rect x="64" y="274" width="218" height="34" rx="9" fill="#2ea04318" stroke="#2ea04340"/><text x="173" y="296">json</text>
    <rect x="64" y="316" width="218" height="34" rx="9" fill="#2ea04318" stroke="#2ea04340"/><text x="173" y="338">json_arrow</text>
    <rect x="64" y="358" width="218" height="34" rx="9" fill="#2ea04318" stroke="#2ea04340"/><text x="173" y="380">xlsx</text>
  </g>

  <!-- Core -->
  <g filter="url(#soft)"><rect x="333" y="196" width="254" height="236" rx="14" fill="url(#card)" stroke="#30363d"/></g>
  <rect x="333" y="196" width="5" height="236" rx="2.5" fill="url(#gCore)"/>
  <text x="351" y="220" fill="#e3b341" font-size="11" font-weight="700" letter-spacing="2">CORE</text>
  <g font-size="12.5" fill="#c9d1d9" font-weight="600" text-anchor="middle">
    <rect x="351" y="232" width="218" height="30" rx="9" fill="#d2992218" stroke="#d2992245"/><text x="460" y="252">orchestrator</text>
    <rect x="351" y="268" width="105" height="30" rx="9" fill="#d2992218" stroke="#d2992245"/><text x="403" y="288">csv_blocks</text>
    <rect x="464" y="268" width="105" height="30" rx="9" fill="#d2992218" stroke="#d2992245"/><text x="516" y="288">pipeline</text>
    <rect x="351" y="304" width="105" height="30" rx="9" fill="#d2992218" stroke="#d2992245"/><text x="403" y="324">writer</text>
    <rect x="464" y="304" width="105" height="30" rx="9" fill="#d2992218" stroke="#d2992245"/><text x="516" y="324">ticker</text>
    <rect x="351" y="340" width="218" height="30" rx="9" fill="#d2992218" stroke="#d2992245"/><text x="460" y="360">counter · validation</text>
  </g>
  <text x="460" y="394" text-anchor="middle" fill="#8b949e" font-size="11">100K-row blocks · cap-8 channels</text>
  <text x="460" y="412" text-anchor="middle" fill="#8b949e" font-size="11">ordered ZSTD writer</text>

  <!-- Schema -->
  <g filter="url(#soft)"><rect x="620" y="196" width="254" height="208" rx="14" fill="url(#card)" stroke="#30363d"/></g>
  <rect x="620" y="196" width="5" height="208" rx="2.5" fill="url(#gSchema)"/>
  <text x="638" y="220" fill="#d2a8ff" font-size="11" font-weight="700" letter-spacing="2">SCHEMA</text>
  <g font-size="12.5" fill="#c9d1d9" font-weight="600" text-anchor="middle">
    <rect x="638" y="232" width="218" height="28" rx="9" fill="#a371f718" stroke="#a371f740"/><text x="747" y="251">schema</text>
    <rect x="638" y="266" width="218" height="28" rx="9" fill="#a371f718" stroke="#a371f740"/><text x="747" y="285">analysis</text>
    <rect x="638" y="300" width="218" height="28" rx="9" fill="#a371f718" stroke="#a371f740"/><text x="747" y="319">types</text>
    <rect x="638" y="334" width="105" height="28" rx="9" fill="#a371f718" stroke="#a371f740"/><text x="690" y="353">builders</text>
    <rect x="751" y="334" width="105" height="28" rx="9" fill="#a371f718" stroke="#a371f740"/><text x="803" y="353">conv.</text>
    <rect x="638" y="368" width="218" height="28" rx="9" fill="#a371f718" stroke="#a371f740"/><text x="747" y="387">gradual narrowing</text>
  </g>

  <!-- Export band -->
  <g filter="url(#soft)"><rect x="46" y="478" width="828" height="64" rx="14" fill="url(#card)" stroke="#30363d"/></g>
  <rect x="46" y="478" width="5" height="64" rx="2.5" fill="url(#gExport)"/>
  <text x="64" y="500" fill="#ff9b72" font-size="11" font-weight="700" letter-spacing="2">EXPORT</text>
  <g font-size="12.5" fill="#c9d1d9" font-weight="600" text-anchor="middle">
    <rect x="64" y="506" width="150" height="26" rx="13" fill="#f7816622" stroke="#f7816655"/><text x="139" y="523">export</text>
    <rect x="226" y="506" width="150" height="26" rx="13" fill="#f7816622" stroke="#f7816655"/><text x="301" y="523">to_csv</text>
    <rect x="388" y="506" width="150" height="26" rx="13" fill="#f7816622" stroke="#f7816655"/><text x="463" y="523">to_json</text>
    <rect x="550" y="506" width="150" height="26" rx="13" fill="#f7816622" stroke="#f7816655"/><text x="625" y="523">to_jsonl</text>
    <rect x="712" y="506" width="150" height="26" rx="13" fill="#f7816622" stroke="#f7816655"/><text x="787" y="523">to_xlsx</text>
  </g>
</svg>
