<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 460" font-family="ui-sans-serif,-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d1117"/><stop offset="1" stop-color="#0a0e14"/>
    </linearGradient>
    <linearGradient id="nInput" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#2ea04333"/><stop offset="1" stop-color="#2ea04314"/></linearGradient>
    <linearGradient id="nSchema" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#1f6feb33"/><stop offset="1" stop-color="#1f6feb14"/></linearGradient>
    <linearGradient id="nProd"  x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#d2992233"/><stop offset="1" stop-color="#d2992214"/></linearGradient>
    <linearGradient id="nChan"  x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#79c0ff33"/><stop offset="1" stop-color="#79c0ff14"/></linearGradient>
    <linearGradient id="nWork"  x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#a371f733"/><stop offset="1" stop-color="#a371f714"/></linearGradient>
    <linearGradient id="nWrite" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#2ea04333"/><stop offset="1" stop-color="#2ea04314"/></linearGradient>
    <linearGradient id="nOut"   x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#f7816633"/><stop offset="1" stop-color="#f7816614"/></linearGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#58a6ff"/>
    </marker>
  </defs>

  <rect width="920" height="460" rx="16" fill="url(#bg)"/>

  <text x="46" y="52" fill="#f0f6fc" font-size="22" font-weight="700">Parallel conversion pipeline</text>
  <text x="46" y="74" fill="#8b949e" font-size="13" font-weight="500" letter-spacing="2.5">STREAM · FAN-OUT · ORDERED WRITE</text>
  <rect x="46" y="86" width="828" height="2" rx="1" fill="#21262d"/>

  <!-- connectors -->
  <g stroke="#58a6ff" stroke-width="2" fill="none" marker-end="url(#ar)">
    <path d="M150 250 L168 250"/>
    <path d="M300 250 L322 250"/>
    <!-- channel to workers fan -->
    <path d="M444 250 C470 250 466 200 488 200"/>
    <path d="M444 250 L488 250"/>
    <path d="M444 250 C470 250 466 300 488 300"/>
    <!-- workers to writer -->
    <path d="M620 200 C648 200 644 250 666 250"/>
    <path d="M620 250 L666 250"/>
    <path d="M620 300 C648 300 644 250 666 250"/>
    <!-- writer to output -->
    <path d="M790 250 L812 250"/>
  </g>
  <!-- schema feed -->
  <g stroke="#a371f7" stroke-width="2" fill="none" stroke-dasharray="5 4" marker-end="url(#ar)" opacity="0.8">
    <path d="M90 222 L90 150 L233 150 L233 222"/>
    <path d="M553 150 L553 184"/>
  </g>
  <path d="M233 150 L553 150" stroke="#a371f7" stroke-width="2" stroke-dasharray="5 4" fill="none" opacity="0.8"/>
  <text x="393" y="142" text-anchor="middle" fill="#d2a8ff" font-size="11.5" font-weight="600">inferred schema (sample 10K → TypeState cascade)</text>

  <!-- nodes -->
  <!-- Input -->
  <g filter="url(#soft)"><rect x="30" y="222" width="120" height="56" rx="13" fill="url(#nInput)" stroke="#2ea04366"/></g>
  <text x="90" y="247" text-anchor="middle" fill="#56d364" font-size="14" font-weight="700">Input</text>
  <text x="90" y="266" text-anchor="middle" fill="#8b949e" font-size="11">stream rows</text>

  <!-- Producer -->
  <g filter="url(#soft)"><rect x="168" y="222" width="132" height="56" rx="13" fill="url(#nProd)" stroke="#d2992266"/></g>
  <text x="234" y="247" text-anchor="middle" fill="#e3b341" font-size="14" font-weight="700">Producer</text>
  <text x="234" y="266" text-anchor="middle" fill="#8b949e" font-size="11">100K-row blocks</text>

  <!-- Channel queue -->
  <g filter="url(#soft)">
    <path d="M334 222 h84 a16 28 0 0 1 0 56 h-84 a16 28 0 0 1 0 -56 z" fill="url(#nChan)" stroke="#79c0ff66"/>
  </g>
  <text x="378" y="247" text-anchor="middle" fill="#79c0ff" font-size="14" font-weight="700">Channel</text>
  <text x="378" y="266" text-anchor="middle" fill="#8b949e" font-size="11">cap 8 · backpr.</text>

  <!-- Workers fan -->
  <g font-size="12.5" font-weight="600" text-anchor="middle">
    <g filter="url(#soft)"><rect x="488" y="182" width="132" height="36" rx="10" fill="url(#nWork)" stroke="#a371f766"/></g>
    <text x="554" y="205" fill="#d2a8ff">rayon worker</text>
    <g filter="url(#soft)"><rect x="488" y="232" width="132" height="36" rx="10" fill="url(#nWork)" stroke="#a371f766"/></g>
    <text x="554" y="255" fill="#d2a8ff">rayon worker</text>
    <g filter="url(#soft)"><rect x="488" y="282" width="132" height="36" rx="10" fill="url(#nWork)" stroke="#a371f766"/></g>
    <text x="554" y="305" fill="#d2a8ff">rayon worker</text>
  </g>
  <text x="554" y="338" text-anchor="middle" fill="#8b949e" font-size="11">par_bridge · per-column metrics</text>

  <!-- Writer -->
  <g filter="url(#soft)"><rect x="666" y="222" width="124" height="56" rx="13" fill="url(#nWrite)" stroke="#2ea04366"/></g>
  <text x="728" y="247" text-anchor="middle" fill="#56d364" font-size="14" font-weight="700">Writer</text>
  <text x="728" y="266" text-anchor="middle" fill="#8b949e" font-size="11">BTreeMap · in order</text>

  <!-- Output -->
  <g filter="url(#soft)"><rect x="812" y="222" width="80" height="56" rx="13" fill="url(#nOut)" stroke="#f7816666"/></g>
  <text x="852" y="247" text-anchor="middle" fill="#ff9b72" font-size="13" font-weight="700">.parquet</text>
  <text x="852" y="266" text-anchor="middle" fill="#8b949e" font-size="11">ZSTD(5)</text>

  <!-- footer note -->
  <text x="46" y="408" fill="#6e7681" font-size="12">Ordered ArrowWriter reassembles parallel results by batch index — input row order preserved despite concurrent completion.</text>
  <text x="46" y="428" fill="#6e7681" font-size="12">Final stage emits a per-column validation report (null / error / valid %).</text>
</svg>
